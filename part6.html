<!DOCTYPE html>
<html>
  <head>
    <title>LOVE | Part 6</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <!-- css -->
    <link rel="stylesheet" href="part6.css">

    <!-- Teachable Machine -->
    <script src="https://code.jquery.com/jquery-3.4.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  </head>
  
  <body>
    <!-- =========================================================== -->
    <!-- ✔️ Create the webcam and label containers -->
    <!-- =========================================================== -->
    <div id="webcam-container" class="scribble-cam"></div>
    <!-- <div id="label-container"></div> -->

    <!-- =========================================================== -->

    <svg width="0" height="0">
      <filter id="squiggle">
        <feTurbulence baseFrequency="0.02" numOctaves="3" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/>
      </filter>
    </svg>
    
    <!-- =========================================================== -->
  
    <div id="mainText1">My First Love Song</div>
    <div id="mainText2"></div>
    <img id="image1">

    <div class="scribble-box" id="buttonRight">
      <a href="end.html" id="buttonR">Close Book</a>
    </div>
    <div class="scribble-box" id="buttonLeft">
      <a href="#" id="buttonL" class="button">Read Lyrics</a>
    </div>

    <div id="popup" class="popup">
      절대 절대 이런 거 못하는데<br>
      고백할게 답은 간단하게<br>
      No thanks? No thanks<br>
      정말 이건 처음 불러보는 노래<br>

      <audio id="bgSong" src="./song/mfls.mp3" loop></audio>
      <button id="songBtn">Play Song</button>
      
    </div>
    



    <script type="text/javascript" src="part6.js"></script>
  </body>
</html>
