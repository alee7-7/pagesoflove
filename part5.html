    <!-- <div class="scribble-box" id="buttonLeft">

    </div> -->

      <div id="lyrics">
        떨어뜨릴까봐 더 <br> 꼭 쥔 초콜렛<br>
        This love for real <br>내 맘을 받아줘<br>
